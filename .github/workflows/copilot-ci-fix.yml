name: copilot-ci-fix

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  create-or-update-copilot-issue:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create or update Copilot CI fix issue
        uses: actions/github-script@v8
        env:
          COPILOT_ASSIGNEE: ${{ vars.COPILOT_ASSIGNEE }}
        with:
          script: |
            const wr = context.payload.workflow_run ?? {};
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const apiHeaders = { "X-GitHub-Api-Version": "2022-11-28" };

            const conclusion = wr.conclusion ?? "";
            if (conclusion !== "failure") {
              core.info(`Skipping because conclusion is '${conclusion || "unknown"}'.`);
              return;
            }

            const branch = wr.head_branch ?? wr.pull_requests?.[0]?.head?.ref ?? "unknown-branch";
            const sha = wr.head_sha ?? context.sha ?? "unknown-sha";
            const shortSha = sha.length >= 7 ? sha.slice(0, 7) : sha;
            const workflowName = wr.name ?? "unknown-workflow";
            const runId = wr.id ? String(wr.id) : "unknown-run";
            const runUrl = wr.html_url ?? `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`;

            const title = `Copilot: Fix CI failure for ${branch} (${shortSha})`;
            const dedupeKey = `ci-fix-key:${branch}:${sha}`;
            const marker = `<!-- ${dedupeKey} -->`;

            const issueBody = [
              marker,
              "## CI Failure Detected",
              "",
              `- Branch: ${branch}`,
              `- Commit SHA: ${sha}`,
              `- Workflow: ${workflowName}`,
              `- Failed Run: ${runUrl}`,
              "",
              "## Copilot Task",
              "",
              "Please perform a minimal, production-safe CI fix for this repository.",
              "",
              "Required actions:",
              "1. Inspect the failing GitHub Actions logs for this run.",
              "2. Identify the root cause of lint/test failure.",
              "3. Fix ONLY lint/test issues with the smallest safe code change.",
              "4. Avoid unrelated refactors or style-only churn.",
              "5. Avoid changing business logic unless required to pass failing checks.",
              "6. Update tests ONLY when tests are incorrect, not to mask defects.",
              "7. Open a pull request containing the fix.",
              "8. In the PR description, explain root cause, fix rationale, and validation steps.",
              "",
              "Retry hint: if CI is flaky or environment-dependent, prefer deterministic test/lint stabilization and document assumptions in the PR.",
            ].join("\n");

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "copilot,ci-fix",
              per_page: 100,
              headers: apiHeaders,
            });

            const existing = issues.find((issue) => {
              if (issue.pull_request) {
                return false;
              }
              const body = issue.body ?? "";
              return issue.title === title || body.includes(marker);
            });

            if (existing) {
              const comment = [
                "A new CI failure was detected for the same branch/SHA context.",
                "",
                `- Branch: ${branch}`,
                `- Commit SHA: ${sha}`,
                `- Workflow: ${workflowName}`,
                `- Failed Run: ${runUrl}`,
                "",
                "@copilot please re-check this failure and continue the fix PR with minimal, production-safe changes.",
              ].join("\n");

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: comment,
                headers: apiHeaders,
              });

              core.info(`Updated existing issue #${existing.number}.`);
              return;
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body: issueBody,
              labels: ["copilot", "ci-fix"],
              headers: apiHeaders,
            });

            const candidateAssignees = [];
            const configuredAssignee = (process.env.COPILOT_ASSIGNEE || "").trim();
            if (configuredAssignee) {
              candidateAssignees.push(configuredAssignee);
            }
            candidateAssignees.push("copilot", "github-copilot[bot]");

            let assigned = false;
            for (const assignee of candidateAssignees) {
              if (!assignee) {
                continue;
              }
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: created.data.number,
                  assignees: [assignee],
                  headers: apiHeaders,
                });
                core.info(`Assigned issue #${created.data.number} to '${assignee}'.`);
                assigned = true;
                break;
              } catch (err) {
                core.warning(`Could not assign '${assignee}': ${err.message}`);
              }
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: created.data.number,
              body: "@copilot please investigate this failed CI run, apply the minimal lint/test fix, and open a PR with root cause + validation details.",
              headers: apiHeaders,
            });

            if (!assigned) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: created.data.number,
                body: "Assignment note: no valid Copilot assignee was found. Configure repository variable COPILOT_ASSIGNEE with a valid account if required by your org policy.",
                headers: apiHeaders,
              });
            }

            core.info(`Created issue #${created.data.number}.`);