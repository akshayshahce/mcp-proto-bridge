name: copilot-pr-auto-assign

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  assign-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR to Copilot
        uses: actions/github-script@v8
        env:
          COPILOT_ASSIGNEE: ${{ vars.COPILOT_ASSIGNEE }}
        with:
          github-token: ${{ secrets.COPILOT_TRIGGER_TOKEN || github.token }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info("No pull_request payload found. Nothing to do.");
              return;
            }

            if (pr.draft) {
              core.info(`PR #${pr.number} is draft. Assignment will run when it is marked ready_for_review.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = pr.number;

            const currentAssignees = new Set((pr.assignees || []).map((a) => a.login));

            const candidates = [];
            const configuredAssignee = (process.env.COPILOT_ASSIGNEE || "").trim();
            if (configuredAssignee) {
              candidates.push(configuredAssignee);
            }
            candidates.push("copilot", "copilot-swe-agent", "github-copilot[bot]");

            let assigned = false;
            for (const assignee of candidates) {
              if (!assignee) {
                continue;
              }
              if (currentAssignees.has(assignee)) {
                core.info(`PR #${issueNumber} is already assigned to '${assignee}'.`);
                assigned = true;
                break;
              }
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  assignees: [assignee],
                });
                core.info(`Assigned PR #${issueNumber} to '${assignee}'.`);
                assigned = true;
                break;
              } catch (err) {
                core.warning(`Could not assign '${assignee}': ${err.message}`);
              }
            }

            if (!assigned) {
              core.warning(
                "No Copilot assignee could be applied. Configure repository variable COPILOT_ASSIGNEE or ensure Copilot assignment is enabled for this repository."
              );
            }
