syntax = "proto3";

package mcpprotobridge.examples.order.v1;

option go_package = "github.com/akshayshahce/mcp-proto-bridge/generated/orderpb;orderpb";

message RecommendationResponse {
  int32 recommended_discount = 1;
  double confidence = 2;
}

message CreateOrderResponse {
  string order_id = 1;
  string status = 2;
  double amount = 3;
}

